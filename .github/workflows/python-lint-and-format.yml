name: Python Lint and Format check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install system libraries for PyQt6
      run: |
        # PyQt6 needs libEGL present for pylint to import it and introspect.
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint black

    - name: Run Pylint
      run: |
        # Run Pylint on all .py files in the directory
        pylint **/*.py

    - name: Check code formatting with Black
      run: |
        # Check if the codebase follows Black's style
        black --check .

